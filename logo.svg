<svg xmlns="http://www.w3.org/2000/svg" width="640" height="200" viewBox="0 0 640 200" role="img" aria-labelledby="title desc">
  <title id="title">LTPF - Lost Track Playlist Finder</title>
  <desc id="desc">Logo tipográfico minimalista con las siglas LTPF y el nombre completo del proyecto</desc>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FFC6"/>
      <stop offset="100%" stop-color="#3BA3FF"/>
    </linearGradient>
  </defs>
  <rect width="640" height="200" fill="#0f1115" rx="16" ry="16"/>
  <g font-family="Segoe UI, Roboto, Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="320" y="110" font-size="96" fill="url(#g)" letter-spacing="10">L T P F</text>
    <text x="320" y="150" font-size="18" fill="#E6F1FF" opacity="0.9">Lost Track Playlist Finder</text>
  </g>
</svg>
